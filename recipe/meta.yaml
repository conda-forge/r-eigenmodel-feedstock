{% set version = "1.12" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-eigenmodel
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/eigenmodel_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/eigenmodel/eigenmodel_{{ version }}.tar.gz
  sha256: 7714d1ac31ec422bea802963d0b4c0577711935d51896b4cdbfe6c2ae393bb89

build:
  number: 0
  noarch: generic

  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]

  host:
    - r-base

  run:
    - r-base

test:
  commands:
    - $R -e "library('eigenmodel')"           # [not win]
    - "\"%R%\" -e \"library('eigenmodel')\""  # [win]

about:
  home: https://pdhoff.github.io/

  license: GPL-2.0-only
  summary: Estimation of the parameters in a model for symmetric relational data (e.g., the above-diagonal part of a square matrix), using a model-based eigenvalue decomposition and regression. Missing data is accommodated, and a posterior mean for missing data is calculated under the assumption that the data are missing
    at random. The marginal distribution of the relational data can be arbitrary, and is fit with an ordered probit specification. See Hoff (2007) <arXiv:0711.1146> for details on the model.

  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r
    - izahn
